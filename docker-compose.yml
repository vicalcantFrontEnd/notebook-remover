version: "3.9"

# ============================================================
# NotebookLM Watermark Remover — Full Stack
# ============================================================
# Services:
#   watermark-api  →  FastAPI + Python processing (port 8000)
#   watermark-web  →  Next.js frontend (port 3005)
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Set VPS_IP=167.88.45.178 in .env
#   3. docker compose up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # FastAPI Watermark Processing API
  # ----------------------------------------------------------
  watermark-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watermark-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Google Drive
      - WMR_GOOGLE_CREDENTIALS_PATH=/app/credentials/google_credentials.json
      - WMR_DRIVE_ROOT_FOLDER_ID=${DRIVE_ROOT_FOLDER_ID}

      # Bunny CDN
      - WMR_BUNNY_API_KEY=${BUNNY_API_KEY}
      - WMR_BUNNY_STORAGE_ZONE=${BUNNY_STORAGE_ZONE}
      - WMR_BUNNY_STORAGE_HOSTNAME=${BUNNY_STORAGE_HOSTNAME:-storage.bunnycdn.com}
      - WMR_BUNNY_PULL_ZONE_HOSTNAME=${BUNNY_PULL_ZONE_HOSTNAME}

      # Pipeline defaults
      - WMR_PIPELINE_VIDEO_METHOD=${PIPELINE_VIDEO_METHOD:-pixel}
      - WMR_PIPELINE_IMAGE_METHOD=${PIPELINE_IMAGE_METHOD:-pixel}
      - WMR_PIPELINE_PDF_METHOD=${PIPELINE_PDF_METHOD:-box}
      - WMR_PIPELINE_SENSITIVITY=${PIPELINE_SENSITIVITY:-30}
      - WMR_PIPELINE_TRIM_END_SECONDS=${PIPELINE_TRIM_END_SECONDS:-0}
      - WMR_AUDIO_TRIM_END_SECONDS=${AUDIO_TRIM_END_SECONDS:-0}

      # App settings
      - WMR_CORS_ORIGINS=["*"]
      - WMR_MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-1}
    volumes:
      # Google credentials (read-only)
      - ./credentials:/app/credentials:ro
      # Persistent pipeline SQLite DB
      - pipeline_data:/app/data
      # Temp files during processing (ephemeral is fine)
      - pipeline_temp:/app/temp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/pipeline/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------
  # Next.js Frontend
  # ----------------------------------------------------------
  watermark-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://${VPS_IP:-localhost}:8000
        - BACKEND_URL=http://watermark-api:8000
    container_name: watermark-web
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - BACKEND_URL=http://watermark-api:8000
    depends_on:
      watermark-api:
        condition: service_healthy


volumes:
  pipeline_data:
  pipeline_temp:
